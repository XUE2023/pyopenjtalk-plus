name: Build Android Wheels (Manual)

on:
  workflow_dispatch:        # 只有手动触发，不会自动运行
    inputs:
      python_version:
        description: 'Python version'
        required: true
        default: '3.13'
        type: choice
        options:
          - '3.13'
      android_abi:
        description: 'Android ABI'
        required: true
        default: 'arm64-v8a'
        type: choice
        options:
          - arm64-v8a
          - armeabi-v7a
          - x86_64

jobs:
  build_android_wheels:
    name: Build Android wheels (${{ inputs.android_abi }}, Python ${{ inputs.python_version }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake

      - name: Download Android NDK
        run: |
          NDK_VERSION=r26d
          wget https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip
          unzip android-ndk-${NDK_VERSION}-linux.zip
          echo "ANDROID_NDK_HOME=$PWD/android-ndk-${NDK_VERSION}" >> $GITHUB_ENV
          echo "$PWD/android-ndk-${NDK_VERSION}/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

      - name: Install Python build dependencies
        run: |
          pip install --upgrade pip
          pip install cython numpy scikit-build-core wheel build

      - name: Build wheel for Android
        env:
          # 设置交叉编译工具链
          CMAKE_ARGS: "-DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake -DANDROID_ABI=${{ inputs.android_abi }} -DANDROID_PLATFORM=24"
          # 避免 pip 尝试下载额外的 cmake 包
          PIP_NO_BUILD_ISOLATION: 1
        run: |
          # 使用 build 模块构建 wheel，不进行隔离（使用当前环境的依赖）
          python -m build --wheel --no-isolation

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: pyopenjtalk-plus-android-${{ inputs.android_abi }}-py${{ inputs.python_version }}
          path: dist/*.whl
          retention-days: 7